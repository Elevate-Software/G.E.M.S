name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: campusgate
          POSTGRES_USER: campus_admin
          POSTGRES_PASSWORD: campus_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: campusgate

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Run Maven Build and Tests
        env:
          DB_URL: jdbc:postgresql://localhost:5432/campusgate
          DB_USER: campus_admin
          DB_PASS: campus_pass
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_jwt_secret_key_needs_to_be_at_least_256_bits_for_signature_validation_12345
          JWT_EXPIRATION: 86400000
        run: ./mvnw clean verify

      - name: Build Docker Image (Dry Run)
        run: docker build -t campusgate:latest .
