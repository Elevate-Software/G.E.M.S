version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=${JWT_SECRET}
      - DB_URL=jdbc:postgresql://db:5432/${DB_NAME:-campusgate}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - campus-net

  db:
    image: postgres:15-alpine
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-campusgate}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-campusgate}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campus-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - campus-net

networks:
  campus-net:
    driver: bridge
